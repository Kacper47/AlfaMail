server {
    listen 80;
    server_name localhost;

    # Automatic redirect to a secure protocol
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/conf.d/nginx.crt;
    ssl_certificate_key /etc/nginx/conf.d/nginx.key;


    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://localhost; frame-ancestors 'none'; base-uri 'self';" always;

    # Proxy Headers 
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- FRONTEND: Static file handling ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Your working try_files logic
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND: Exact API matches (to avoid breaking .html routing) ---
    # location = means that Nginx will check for an EXACT address match
    location = /register { proxy_pass http://backend:8000; }
    location = /login { proxy_pass http://backend:8000; }
    location = /login/verify-2fa { proxy_pass http://backend:8000; }
    
    # Prefix-based path handling
    location /2fa/ { proxy_pass http://backend:8000; }
    location /keys/ { proxy_pass http://backend:8000; }
    location /messages/ { proxy_pass http://backend:8000; }

    # API Documentation
    location /docs { proxy_pass http://backend:8000; }
    location /openapi.json { proxy_pass http://backend:8000; }
}